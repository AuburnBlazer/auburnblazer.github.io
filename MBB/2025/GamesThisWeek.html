                <script>
function filterGames() {

    const selected =
        document.getElementById("conferenceFilter").value;

    const matchups =
        document.querySelectorAll(".matchup-link");

    matchups.forEach(matchup => {

        const away =
            matchup.dataset.awayConf;

        const home =
            matchup.dataset.homeConf;

        if (
            selected === "ALL" ||
            away === selected ||
            home === selected
        ) {
            matchup.style.display = "block";
        }
        else {
            matchup.style.display = "none";
        }
    });
}
</script>
